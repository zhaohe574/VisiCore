root /app/wwwroot;
index index.html;

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

location /api/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Forwarded-Proto $visicore_forwarded_proto;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 30s;
}

location = /healthz {
    proxy_pass http://127.0.0.1:8081/healthz;
}

location = /readyz {
    proxy_pass http://127.0.0.1:8081/readyz;
}

location = /stream/healthz {
    proxy_pass http://127.0.0.1:15095/healthz;
}

location = /stream/readyz {
    proxy_pass http://127.0.0.1:15095/readyz;
}

location = /internal/mediamtx/auth {
    proxy_pass http://127.0.0.1:15095/internal/mediamtx/auth;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $visicore_forwarded_proto;
    proxy_set_header X-Forwarded-For $remote_addr;
}

location /stream/ {
    proxy_pass http://127.0.0.1:15095/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $visicore_forwarded_proto;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 60s;
}

location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store";
}
