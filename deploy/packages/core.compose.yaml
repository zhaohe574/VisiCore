name: visicore

services:
  visicore-core:
    image: ${VISICORE_CORE_IMAGE:?请使用部署包生成的 .env 文件}
    restart: unless-stopped
    ports:
      - "${ADMIN_HTTP_BIND_ADDRESS:-127.0.0.1}:${ADMIN_HTTP_PORT:-8080}:8080"
      - "${ADMIN_HTTPS_BIND_ADDRESS:-127.0.0.1}:${ADMIN_HTTPS_PORT:-8443}:8443"
    environment:
      VISICORE_HTTPS_ENABLED: ${VISICORE_HTTPS_ENABLED:-false}
      VISICORE_TLS_CERTIFICATE_FILE: /run/visicore/tls/tls.crt
      VISICORE_TLS_PRIVATE_KEY_FILE: /run/visicore/tls/tls.key
      CoreUpgrade__Enabled: ${VISICORE_CORE_UPGRADE_ENABLED:-true}
      CoreUpgrade__ExchangeDirectory: /var/lib/visicore/upgrade-exchange
      ReleaseGovernance__RepositoryUrl: ${VISICORE_RELEASE_GOVERNANCE_REPOSITORY_URL:-https://github.com/zhaohe574/VisiCore}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - visicore-config:/var/lib/visicore/config
      - api-exports:/var/lib/visicore/exports
      - visicore-backups:/var/lib/visicore/backups
      - "${VISICORE_UPGRADE_EXCHANGE_DIRECTORY:?请使用部署包生成的 .env 文件}:/var/lib/visicore/upgrade-exchange"
      - "${VISICORE_TLS_DIRECTORY:-./tls}:/run/visicore/tls:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres-data:
    name: ${VISICORE_POSTGRES_VOLUME:-visicore_postgres-data}
  visicore-config:
    name: ${VISICORE_CONFIG_VOLUME:-visicore_visicore-config}
  api-exports:
    name: ${VISICORE_EXPORTS_VOLUME:-visicore_api-exports}
  visicore-backups:
    name: ${VISICORE_BACKUPS_VOLUME:-visicore_visicore-backups}

networks:
  default:
    name: ${VISICORE_NETWORK:-visicore-network}
