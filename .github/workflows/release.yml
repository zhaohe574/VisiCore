name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VisiCore.Setup/VisiCore.Setup.csproj --build-arg ASSEMBLY=VisiCore.Setup.dll --tag ghcr.io/${{ github.repository_owner }}/visicore-setup:${{ github.ref_name }} --push .
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VisiCore.Api/VisiCore.Api.csproj --build-arg ASSEMBLY=VisiCore.Api.dll --tag ghcr.io/${{ github.repository_owner }}/visicore-api:${{ github.ref_name }} --push .
      - run: docker build --file src/VisiCore.Admin/Dockerfile --tag ghcr.io/${{ github.repository_owner }}/visicore-admin:${{ github.ref_name }} --push src/VisiCore.Admin
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VisiCore.NotificationWorker/VisiCore.NotificationWorker.csproj --build-arg ASSEMBLY=VisiCore.NotificationWorker.dll --tag ghcr.io/${{ github.repository_owner }}/visicore-notification-worker:${{ github.ref_name }} --push .
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VisiCore.StreamGateway/VisiCore.StreamGateway.csproj --build-arg ASSEMBLY=VisiCore.StreamGateway.dll --tag ghcr.io/${{ github.repository_owner }}/visicore-stream-gateway:${{ github.ref_name }} --push .
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VisiCore.OnvifEdgeWorker/VisiCore.OnvifEdgeWorker.csproj --build-arg ASSEMBLY=VisiCore.OnvifEdgeWorker.dll --tag ghcr.io/${{ github.repository_owner }}/visicore-onvif-edge-worker:${{ github.ref_name }} --push .
      - uses: anchore/sbom-action@v0
        with:
          artifact-name: visicore-sbom.spdx.json
          output-file: visicore-sbom.spdx.json
          path: .
      - run: sha256sum compose.yaml NOTICE THIRD_PARTY_NOTICES.md visicore-sbom.spdx.json > release-sha256.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            compose.yaml
            release-sha256.txt
            NOTICE
            THIRD_PARTY_NOTICES.md
            visicore-sbom.spdx.json
