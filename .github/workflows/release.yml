name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VideoPlatform.Api/VideoPlatform.Api.csproj --build-arg ASSEMBLY=VideoPlatform.Api.dll --tag ghcr.io/${{ github.repository_owner }}/video-platform-api:${{ github.ref_name }} --push .
      - run: docker build --file src/VideoPlatform.Admin/Dockerfile --tag ghcr.io/${{ github.repository_owner }}/video-platform-admin:${{ github.ref_name }} --push src/VideoPlatform.Admin
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VideoPlatform.NotificationWorker/VideoPlatform.NotificationWorker.csproj --build-arg ASSEMBLY=VideoPlatform.NotificationWorker.dll --tag ghcr.io/${{ github.repository_owner }}/video-platform-notification-worker:${{ github.ref_name }} --push .
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VideoPlatform.StreamGateway/VideoPlatform.StreamGateway.csproj --build-arg ASSEMBLY=VideoPlatform.StreamGateway.dll --tag ghcr.io/${{ github.repository_owner }}/video-platform-stream-gateway:${{ github.ref_name }} --push .
      - run: docker build --file deploy/linux/Dockerfile.dotnet --build-arg PROJECT=src/VideoPlatform.OnvifEdgeWorker/VideoPlatform.OnvifEdgeWorker.csproj --build-arg ASSEMBLY=VideoPlatform.OnvifEdgeWorker.dll --tag ghcr.io/${{ github.repository_owner }}/video-platform-onvif-edge-worker:${{ github.ref_name }} --push .
      - run: sha256sum compose.yaml NOTICE THIRD_PARTY_NOTICES.md > release-sha256.txt
      - uses: anchore/sbom-action@v0
        with:
          artifact-name: video-platform-sbom.spdx.json
          path: .
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            compose.yaml
            release-sha256.txt
            NOTICE
            THIRD_PARTY_NOTICES.md
